<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>OCNJ 2026 Summer Rental Market Trends</title>
<style>
:root {
  --ocean:#0a3d5c; --mid:#1a6b96; --light:#4db8e8;
  --sand:#f5e9d0; --gray:#7a8c99; --black:#1a2b36;
  --green:#059669; --yellow:#f59e0b; --red:#dc2626;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:#f8fafb; color:var(--black);
  line-height:1.6;
}

.header {
  background:linear-gradient(135deg, var(--ocean) 0%, var(--mid) 100%);
  color:white; padding:40px 20px; text-align:center;
  box-shadow:0 4px 20px rgba(10,61,92,0.2);
}

.header h1 {
  font-size:2rem; margin-bottom:8px;
}

.header .subtitle {
  font-size:1rem; opacity:0.9; margin-bottom:20px;
}

.header .nav {
  display:flex; gap:12px; justify-content:center; flex-wrap:wrap;
}

.header .nav a {
  background:rgba(255,255,255,0.2); color:white; padding:10px 20px;
  border-radius:8px; text-decoration:none; font-weight:600;
  transition:background 0.2s;
}

.header .nav a:hover {
  background:rgba(255,255,255,0.3);
}

.container {
  max-width:1400px; margin:30px auto; padding:0 20px;
}

.info-box {
  background:white; border-radius:12px; padding:24px;
  box-shadow:0 2px 16px rgba(10,61,92,0.1); margin-bottom:30px;
}

.info-box h2 {
  font-size:1.3rem; color:var(--ocean); margin-bottom:12px;
}

.info-box p {
  color:var(--gray); margin-bottom:8px;
}

.legend {
  display:flex; gap:20px; flex-wrap:wrap; margin-top:16px;
}

.legend-item {
  display:flex; align-items:center; gap:8px;
}

.legend-dot {
  width:12px; height:12px; border-radius:50%;
}

.legend-dot.slow { background:var(--green); }
.legend-dot.medium { background:var(--yellow); }
.legend-dot.hot { background:var(--red); }

.table-container {
  background:white; border-radius:12px;
  box-shadow:0 2px 16px rgba(10,61,92,0.1);
  overflow-x:auto;
}

table {
  width:100%; border-collapse:collapse;
}

thead {
  background:var(--ocean); color:white;
  position:sticky; top:0;
}

thead th {
  padding:16px 12px; text-align:left; font-weight:600;
  font-size:0.85rem; text-transform:uppercase; letter-spacing:0.05em;
}

tbody tr {
  border-bottom:1px solid #e5e7eb;
  transition:background 0.2s;
}

tbody tr:hover {
  background:#f8fafb;
}

tbody td {
  padding:14px 12px;
}

.week-cell {
  font-weight:600; color:var(--ocean);
}

.week-cell a {
  color:var(--ocean); text-decoration:none;
  display:block;
}

.week-cell a:hover {
  text-decoration:underline; color:var(--mid);
}

.number-cell {
  text-align:right; font-variant-numeric:tabular-nums;
}

.velocity-cell {
  text-align:center; font-weight:600;
  padding:6px 12px; border-radius:6px;
}

.velocity-slow { background:#dcfce7; color:var(--green); }
.velocity-medium { background:#fef3c7; color:#92400e; }
.velocity-hot { background:#fee2e2; color:var(--red); }

.price-comparison {
  font-size:0.85rem; color:var(--gray);
}

.price-higher { color:var(--red); }
.price-lower { color:var(--green); }

.loading {
  text-align:center; padding:60px; color:var(--gray);
}

.error {
  background:#fee2e2; color:#991b1b; padding:20px;
  border-radius:8px; border-left:4px solid #dc2626;
}

.no-data {
  text-align:center; padding:40px; color:var(--gray);
}

/* Expandable row toggle */
.expand-btn {
  background:none; border:none; cursor:pointer;
  color:var(--mid); font-size:1rem; padding:2px 6px;
  border-radius:4px; transition:background 0.15s;
  line-height:1;
}
.expand-btn:hover { background:#e0f2fe; }

tbody tr.data-row { cursor:pointer; }
tbody tr.data-row:hover { background:#f0f7ff; }

/* Detail row that appears when expanded */
tr.detail-row td {
  padding:0; background:#f8fafb;
  border-bottom:2px solid var(--mid);
}
tr.detail-row.hidden { display:none; }

.detail-inner {
  padding:20px 24px;
}

.detail-inner h4 {
  font-size:0.95rem; color:var(--ocean);
  margin-bottom:14px; font-weight:700;
}

/* Booking progression chart */
.chart-wrap {
  width:100%; overflow-x:auto;
}

.booking-chart {
  display:block; width:100%; min-width:300px;
}

.chart-bar-group {
  display:flex; align-items:flex-end; gap:4px;
  height:120px; margin-bottom:6px;
}

.chart-col {
  display:flex; flex-direction:column; align-items:center;
  flex:1; min-width:40px;
}

.chart-bar {
  width:100%; border-radius:4px 4px 0 0;
  transition:height 0.3s ease;
  position:relative;
}
.chart-bar.available { background:var(--mid); }
.chart-bar.rented { background:#fee2e2; border:1px solid #fca5a5; }

.chart-label {
  font-size:0.65rem; color:var(--gray); text-align:center;
  margin-top:4px; white-space:nowrap;
}
.chart-value {
  font-size:0.7rem; font-weight:700; color:var(--ocean);
  text-align:center; margin-bottom:3px;
}

.chart-legend {
  display:flex; gap:16px; margin-top:10px; flex-wrap:wrap;
}
.chart-legend-item {
  display:flex; align-items:center; gap:6px;
  font-size:0.8rem; color:var(--gray);
}
.chart-legend-dot {
  width:12px; height:12px; border-radius:3px;
}

/* Stats row inside detail */
.detail-stats {
  display:flex; gap:16px; flex-wrap:wrap; margin-top:14px;
  padding-top:14px; border-top:1px solid #e5e7eb;
}
.detail-stat {
  flex:1; min-width:100px; text-align:center;
  background:white; padding:10px; border-radius:8px;
  border:1px solid #e5e7eb;
}
.detail-stat-label {
  font-size:0.75rem; color:var(--gray); margin-bottom:4px;
}
.detail-stat-value {
  font-size:1.2rem; font-weight:700; color:var(--ocean);
}

@media(max-width:600px) {
  .detail-inner { padding:14px; }
  .chart-col { min-width:28px; }
}

.footer {
  text-align:center; padding:40px 20px; color:var(--gray);
  font-size:0.9rem;
}

/* Mobile Responsive */
@media (max-width: 768px) {
  .header h1 { font-size:1.5rem; }
  .header .subtitle { font-size:0.9rem; }
  .header .nav { gap:8px; }
  .header .nav a { padding:8px 14px; font-size:0.85rem; }
  
  .container { padding:0 12px; margin:20px auto; }
  .info-box { padding:16px; }
  .info-box h2 { font-size:1.1rem; }
  
  .table-container { border-radius:8px; }
  
  table { font-size:0.85rem; min-width:700px; }
  thead th { padding:12px 8px; font-size:0.75rem; }
  tbody td { padding:10px 8px; }
  
  .legend { gap:12px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>🏖️ OCNJ 2026 Summer Rental Market</h1>
  <div class="subtitle">Track rental trends and booking velocity across all summer weeks</div>
  <div class="nav">
    <a href="ocnj-rental-map-final.html">🗺️ Browse Map</a>
    <a href="ocnj-comp-analysis.html">📊 Comp Analysis</a>
  </div>
</div>

<div class="container">
  <div id="info-section"></div>
  <div id="table-section" class="table-container">
    <div class="loading">Loading market trends...</div>
  </div>
</div>

<div class="footer">
  OCNJ Rental Map • Data from Berger Realty • Updated <span id="update-date">--</span>
</div>

<script>
async function loadTrends() {
  try {
    const response = await fetch('market-trends.json');
    if (!response.ok) throw new Error('Trends file not found');
    
    const data = await response.json();
    
    // Update footer date
    document.getElementById('update-date').textContent = data.latest_snapshot || data.generated;
    
    // Show info box
    renderInfoBox(data);
    
    // If no weeks data, show message
    if (!data.weeks || data.weeks.length === 0) {
      document.getElementById('table-section').innerHTML = `
        <div class="no-data">
          <h3>Not Enough Data Yet</h3>
          <p>${data.message || 'Run the pipeline a few more times to build trend history.'}</p>
          <p style="margin-top:12px;">Snapshots collected: ${data.snapshots_analyzed || 0}</p>
        </div>`;
      return;
    }
    
    // Render table
    renderTable(data.weeks);
    
  } catch (error) {
    console.error('Error loading trends:', error);
    document.getElementById('table-section').innerHTML = `
      <div class="error">
        <strong>Error Loading Trends</strong><br>
        ${error.message}<br><br>
        Make sure you've run the pipeline at least twice to generate trend data.
      </div>`;
  }
}

function renderInfoBox(data) {
  const snapshots = data.snapshots_analyzed || 0;
  const dateRange = data.first_snapshot && data.latest_snapshot 
    ? `${data.first_snapshot} → ${data.latest_snapshot}`
    : 'Building history...';
  
  const html = `
    <div class="info-box">
      <h2>How to Read This Data</h2>
      <p><strong>Available Now:</strong> Number of properties still available for that week</p>
      <p><strong>Booked This Week:</strong> Properties that rented since the last update</p>
      <p><strong>Avg Price (Available):</strong> Average weekly rate of properties still on the market</p>
      <p><strong>Avg Price (Rented):</strong> Average weekly rate of properties that rented since first snapshot</p>
      <p><strong>Velocity:</strong> Properties rented per week over entire tracking period (higher = booking faster)</p>
      <p style="margin-top:12px;"><strong>Snapshots analyzed:</strong> ${snapshots} weeks of data (${dateRange})</p>
      
      <div class="legend">
        <div class="legend-item">
          <div class="legend-dot slow"></div>
          <span>Slow (< 30/week)</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot medium"></div>
          <span>Medium (30-60/week)</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot hot"></div>
          <span>Hot (> 60/week)</span>
        </div>
      </div>
    </div>`;
  
  document.getElementById('info-section').innerHTML = html;
}

function renderChart(history, currentAvail) {
  if (!history || history.length < 2) {
    return '<p style="color:var(--gray);font-size:0.85rem;">Not enough history yet — needs 2+ snapshots.</p>';
  }

  const maxAvail = Math.max(...history.map(h => h.available), 1);
  const firstAvail = history[0].available;
  const chartH = 120;

  // Build columns
  let cols = '';
  history.forEach((h, i) => {
    const availH = Math.round((h.available / maxAvail) * chartH);
    const rentedCount = Math.max(0, firstAvail - h.available);
    const rentedH = Math.round((rentedCount / maxAvail) * chartH);
    const label = h.date.slice(5); // "MM-DD"

    cols += '<div class="chart-col">' +
      '<div class="chart-value">' + h.available + '</div>' +
      '<div style="display:flex;align-items:flex-end;gap:2px;height:' + chartH + 'px;">' +
        '<div class="chart-bar available" style="height:' + availH + 'px;flex:1;" title="Available: ' + h.available + '"></div>' +
        (rentedH > 0 ? '<div class="chart-bar rented" style="height:' + rentedH + 'px;flex:1;" title="Rented: ' + rentedCount + '"></div>' : '') +
      '</div>' +
      '<div class="chart-label">' + label + '</div>' +
      '</div>';
  });

  const totalBooked = firstAvail - currentAvail;
  const pctBooked = firstAvail > 0 ? Math.round((totalBooked / firstAvail) * 100) : 0;

  return '<div class="chart-wrap">' +
    '<h4>Booking Progression (' + history.length + ' snapshots, one per pipeline week)</h4>' +
    '<div class="chart-bar-group">' + cols + '</div>' +
    '<div class="chart-legend">' +
      '<div class="chart-legend-item"><div class="chart-legend-dot" style="background:var(--mid)"></div> Still available</div>' +
      '<div class="chart-legend-item"><div class="chart-legend-dot" style="background:#fee2e2;border:1px solid #fca5a5"></div> Booked (vs. first snapshot)</div>' +
    '</div>' +
    '</div>' +
    '<div class="detail-stats">' +
      '<div class="detail-stat"><div class="detail-stat-label">First Tracked</div><div class="detail-stat-value">' + history[0].available + '</div></div>' +
      '<div class="detail-stat"><div class="detail-stat-label">Available Now</div><div class="detail-stat-value">' + currentAvail + '</div></div>' +
      '<div class="detail-stat"><div class="detail-stat-label">Total Booked</div><div class="detail-stat-value" style="color:var(--red)">' + totalBooked + '</div></div>' +
      '<div class="detail-stat"><div class="detail-stat-label">% Booked</div><div class="detail-stat-value">' + pctBooked + '%</div></div>' +
    '</div>';
}

function renderTable(weeks) {
  let html = `
    <table>
      <thead>
        <tr>
          <th style="width:32px;"></th>
          <th>Week Starting</th>
          <th class="number-cell">Available Now</th>
          <th class="number-cell">Booked This Update</th>
          <th class="number-cell">Avg Price (Available)</th>
          <th class="number-cell">Avg Price (Rented)</th>
          <th>Velocity</th>
        </tr>
      </thead>
      <tbody>`;

  weeks.forEach((week, idx) => {
    const availPrice = week.avg_price_available;
    const rentedPrice = week.avg_price_rented;

    const velocity = week.velocity_per_week;
    let velocityClass = 'velocity-slow';
    if (velocity >= 60) velocityClass = 'velocity-hot';
    else if (velocity >= 30) velocityClass = 'velocity-medium';

    let priceComparison = '';
    if (availPrice && rentedPrice) {
      const diff = rentedPrice - availPrice;
      const pct = ((diff / availPrice) * 100).toFixed(0);
      if (Math.abs(diff) > 200) {
        const sign = diff > 0 ? '+' : '';
        const cls = diff > 0 ? 'price-higher' : 'price-lower';
        const insight = diff > 0 ? '(premium moving)' : '(budget moving)';
        priceComparison = '<div class="price-comparison ' + cls + '">' + sign + pct + '% ' + insight + '</div>';
      }
    }

    const rowId = 'detail-' + idx;

    // Data row with expand button
    html += `
      <tr class="data-row" onclick="toggleDetail('${rowId}')">
        <td style="text-align:center;">
          <button class="expand-btn" id="btn-${rowId}" title="Show booking history">▶</button>
        </td>
        <td class="week-cell">
          <a href="ocnj-rental-map-final.html?week=${week.week_start}" onclick="event.stopPropagation()">
            ${week.week_label}
          </a>
        </td>
        <td class="number-cell">${week.available_now.toLocaleString()}</td>
        <td class="number-cell">${week.rented_since_last || 0}</td>
        <td class="number-cell">${availPrice ? '$' + Math.round(availPrice).toLocaleString() : '—'}</td>
        <td class="number-cell">
          ${rentedPrice ? '$' + Math.round(rentedPrice).toLocaleString() : '—'}
          ${priceComparison}
        </td>
        <td>
          <div class="velocity-cell ${velocityClass}">${velocity.toFixed(1)}/week</div>
        </td>
      </tr>`;

    // Hidden detail row with chart
    const chartHtml = renderChart(week.history, week.available_now);
    html += `
      <tr class="detail-row hidden" id="${rowId}">
        <td colspan="7">
          <div class="detail-inner">${chartHtml}</div>
        </td>
      </tr>`;
  });

  html += `</tbody></table>`;
  document.getElementById('table-section').innerHTML = html;
}

function toggleDetail(rowId) {
  const row = document.getElementById(rowId);
  const btn = document.getElementById('btn-' + rowId);
  const isHidden = row.classList.contains('hidden');
  row.classList.toggle('hidden', !isHidden);
  btn.textContent = isHidden ? '▼' : '▶';
}

// Load on page load
loadTrends();
</script>

</body>
</html>
